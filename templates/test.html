{% extends 'base.html' %}

{% block title %}Food Delivery - 首页测试{% endblock %}

{% block content %}
<!-- 顶部横幅 -->
<div class="bg-warning bg-opacity-10 p-5 rounded-3 mb-5">
    <div class="container py-4">
        <h1 class="display-4 fw-bold">饿了么？🍽️</h1>
        <p class="lead">今天想吃点什么？来看看附近的美食吧</p>
        <a href="/restaurants/" class="btn btn-primary btn-lg mt-3">立即点餐</a>
    </div>
</div>

<!-- 三大特色板块 -->
<div class="row g-4 mb-5">
    <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm">
            <div class="card-body text-center p-4">
                <div class="display-1 mb-3">
                    <i class="bi bi-shop text-warning"></i>
                </div>
                <h3 class="h4 mb-3">精选餐厅</h3>
                <p class="text-muted">周边百家餐厅，中餐西餐日料韩餐，总有一家合你口味</p>
                <a href="/restaurants/" class="btn btn-outline-primary mt-2">查看餐厅</a>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm">
            <div class="card-body text-center p-4">
                <div class="display-1 mb-3">
                    <i class="bi bi-cart text-warning"></i>
                </div>
                <h3 class="h4 mb-3">极速下单</h3>
                <p class="text-muted">一键加入购物车，多种支付方式，下单即送</p>
                <a href="/cart/" class="btn btn-outline-primary mt-2">去购物车</a>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm">
            <div class="card-body text-center p-4">
                <div class="display-1 mb-3">
                    <i class="bi bi-box text-warning"></i>
                </div>
                <h3 class="h4 mb-3">实时跟踪</h3>
                <p class="text-muted">订单状态实时更新，从接单到送达全程掌握</p>
                <a href="/orders/" class="btn btn-outline-primary mt-2">查看订单</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
